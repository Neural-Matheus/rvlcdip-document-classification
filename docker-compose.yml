services:
  rvlcdip:
    build:
      context: .
      network: host
    image: rvlcdip:latest
    container_name: rvlcdip
    working_dir: /workspace
    user: "1031:1031"
    network_mode: host
    volumes:
      - .:/workspace
    environment:
      - HOME=/workspace
      - HF_HOME=/workspace/.hf_cache
      - MPLCONFIGDIR=/workspace/.mplconfig
      - DEVICE_INDEX=0
      - N_TRAIN=${N_TRAIN:-2000}
      - N_VAL=${N_VAL:-250}
      - N_TEST=${N_TEST:-500}
      - EPOCHS=${EPOCHS:-12}
      - BATCH_SIZE=${BATCH_SIZE:-32}
      - NUM_WORKERS=${NUM_WORKERS:-8}
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command: tail -f /dev/null
